version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: nhiot-mqtt-broker
    ports:
      - "18883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  server-audit:
    build: .
    container_name: nhiot-server-audit
    env_file:
      - .env.example
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - USE_LOCAL_BROKER=true
    command: ./run_sub_server.sh
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  iot-subscriber:
    build: .
    container_name: nhiot-iot-subscriber
    env_file:
      - .env.example
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - USE_LOCAL_BROKER=true
    command: ./run_sub_iot.sh
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  publisher:
    build: .
    container_name: nhiot-publisher
    env_file:
      - .env.example
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - USE_LOCAL_BROKER=true
    command: tail -f /dev/null
    depends_on:
      - mqtt-broker
