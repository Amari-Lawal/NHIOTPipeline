name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: caesaraiapis
  REGION: us-central1
  SERVICE_NAME: nhiot
  GAR_LOCATION: us-central1-docker.pkg.dev/caesaraiapis/caesaraiapis/nhiot

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Recreate Configs and Credentials
        run: |
          mkdir -p NHIOTMQTT NHIOTSub AWSMqtt/keys
          echo "${{ secrets.NHIOT_MQTT_ENV }}" > NHIOTMQTT/.env
          echo "${{ secrets.NHIOT_SUB_ENV }}" > NHIOTSub/.env
          echo "${{ secrets.AWS_CA_PEM }}" > AWSMqtt/keys/AmazonRootCA1.pem
          echo "${{ secrets.AWS_CERT_CRT }}" > AWSMqtt/keys/device-certificate.pem.crt
          echo "${{ secrets.AWS_PRIVATE_KEY }}" > AWSMqtt/keys/private.pem.key

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Tag Container
        run: |
          docker build \
            -t ${{ env.GAR_LOCATION }}:${{ github.sha }} \
            -t ${{ env.GAR_LOCATION }}:latest \
            -f Dockerfile .

      - name: Push Container to Artifact Registry
        run: |
          docker push ${{ env.GAR_LOCATION }}:${{ github.sha }}
          docker push ${{ env.GAR_LOCATION }}:latest

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
