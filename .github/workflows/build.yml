name: Build C Executables

on:
  push:
    branches: [ main, master, staging, test, dev, develop ]
  pull_request:
    branches: [ main, master, staging, dev ]
  workflow_dispatch:

jobs:
  security-scan:
    name: DevSecOps & Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cppcheck and Flawfinder
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck flawfinder

      - name: Run Cppcheck Memory & Static Analysis (SAST)
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem Artefact/*.c

      - name: Run Flawfinder Vulnerability Risk Analysis (SAST)
        run: |
          flawfinder --minlevel=1 Artefact/

      - name: Run Trivy C Dependency & Repository Scan (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Secret Leak Prevention (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  python-quality:
    name: Python Format & Lint Check (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Format Check
        run: ruff format --check --line-length 120 .

      - name: Run Ruff Lint Check
        run: ruff check --select E,F,W,I --ignore E501,W293 .

  build:
    name: Build C Executable
    runs-on: ubuntu-latest
    needs: [security-scan, python-quality]

    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            sudo apt-get install -y gcc-x86-64-linux-gnu
          fi

      - name: Compile C program with Security Hardening Flags
        run: |
          SEC_FLAGS="-O2 -Wall -Wextra -fstack-protector-strong -D_FORTIFY_SOURCE=2 -Wformat -Wformat-security"
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            aarch64-linux-gnu-gcc $SEC_FLAGS -o hello_aarch64 Artefact/*.c
          else
            x86_64-linux-gnu-gcc $SEC_FLAGS -o hello_x86_64 Artefact/*.c
          fi

      - name: Generate Cryptographic SHA-256 Checksum
        run: |
          sha256sum hello_${{ matrix.arch }} > hello_${{ matrix.arch }}.sha256
          echo "SHA256 Checksum:"
          cat hello_${{ matrix.arch }}.sha256

      - name: Run Trivy C Binary Artifact Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'hello_${{ matrix.arch }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload executable and checksum artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hello_${{ matrix.arch }}
          path: |
            hello_${{ matrix.arch }}
            hello_${{ matrix.arch }}.sha256
